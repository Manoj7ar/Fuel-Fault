    <path d="M118 66h13c8 0 14 6 14 14v27c0 7 4 11 10 11 5 0 9-4 9-9V78" fill="none" stroke="url(#amber)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
